<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPDP Navigator - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { width: 350px; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 20px; color: #4f46e5; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background: #4f46e5; color: white; margin-top: 10px; }
        button:hover { background: #4338ca; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>DPDP Compliance Login</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button onclick="login()">Login to Dashboard</button>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('access_token', data.access_token);
                window.location.href = "/profile"; // Redirect to profile/dashboard
            } else {
                alert('Login failed. Please check your credentials.');
            }
        }                   
    </script>
    <script>    
        async function sendMessage() {
    const userInput = document.getElementById('user-message').value;
    const token = localStorage.getItem('access_token');

    const response = await fetch('/ai/chat', { // Must include /ai/
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ message: userInput })
    });

    const result = await response.json();
    if (result.status === 'success') {
        const chatBox = document.getElementById('chat-display');
        chatBox.innerHTML += `<p><strong>You:</strong> ${userInput}</p>`;
        chatBox.innerHTML += `<p><strong>AI:</strong> ${result.answer}</p>`;
        document.getElementById('user-input').value = ''; // Clear input
    } else {
        // Display error message
        console.error("Error:", result.message);
    }
}
    </script>
</body>
</html>
