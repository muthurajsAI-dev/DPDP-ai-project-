<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPDP AI Assistant - Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .dashboard-container { width: 100%; max-width: 700px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; overflow: hidden; }
        .user-header { padding: 20px; background: #007bff; color: white; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #ffffff; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .user-msg { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white; }
        input[type="text"] { flex-grow: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: 600; }
        button:hover { background: #0056b3; }
    </style>

    <script>
        // Security Check: Redirect if no token
        const token = localStorage.getItem('access_token');
        if (!token) { window.location.href = "/"; }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            if (!input || !input.value.trim()) return;

            const messageText = input.value;
            appendMessage('user', messageText);
            input.value = ''; 

            try {
                const response = await fetch('/ai/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ message: messageText })
                });

                const result = await response.json();
                if (result.status === "success") {
                    appendMessage('ai', result.answer);
                } else {
                    appendMessage('ai', "Error: " + result.message);
                }
            } catch (error) {
                appendMessage('ai', "I couldn't reach the server. Please check your connection.");
            }
        }

        function appendMessage(sender, text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}-msg`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Allow sending with Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') { sendMessage(); }
        }
    </script>
</head>
<body>
    <div class="dashboard-container">
        <header class="user-header">
            <h2 style="margin: 0; font-size: 1.2rem;">DPDP AI Assistant</h2>
            <div style="font-size: 0.8rem; opacity: 0.9;">● Online</div>
        </header>

        <main id="chat-box">
            <div class="msg ai-msg">Welcome back! I'm here to help you navigate the DPDP Act. What's on your mind?</div>
        </main>

        <footer class="input-area">
            <input type="text" id="userInput" placeholder="Ask a question..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </footer>
    </div>
</body>
</html>
